name: Run Manual SQL Migration

on:
  workflow_dispatch:
    inputs:
      migration_file:
        description: 'SQL file to run (relative to prisma/manual_migrations/)'
        required: true
        default: 'add_task_conversations.sql'
      confirm:
        description: 'Type "yes" to confirm you want to run this migration against the production database'
        required: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'yes' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate migration file exists
        env:
          MIGRATION_INPUT: ${{ github.event.inputs.migration_file }}
        run: |
          # Trim leading/trailing whitespace from the input — copy-paste often drags a trailing space.
          MIGRATION_NAME=$(echo "$MIGRATION_INPUT" | xargs)
          echo "MIGRATION_NAME=$MIGRATION_NAME" >> $GITHUB_ENV
          FILE="prisma/manual_migrations/$MIGRATION_NAME"
          if [ ! -f "$FILE" ]; then
            echo "ERROR: Migration file '$FILE' not found"
            exit 1
          fi
          echo "Migration file found: $FILE"
          echo "--- SQL Preview (first 30 lines) ---"
          head -30 "$FILE"

      - name: Run SQL migration on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_PORT }}
          envs: MIGRATION_NAME
          script: |
            set -e
            APP_DIR=/var/www/hexasteel.sa/ots
            MIGRATION_FILE="prisma/manual_migrations/$MIGRATION_NAME"

            if [ ! -f "$APP_DIR/$MIGRATION_FILE" ]; then
              echo "ERROR: File not found on server: $APP_DIR/$MIGRATION_FILE"
              exit 1
            fi

            echo "Running migration: $MIGRATION_FILE"

            # Connect as MySQL root with no password. The ots_user account
            # in .env only has application-level privileges and cannot
            # execute the DDL (CREATE PROCEDURE / ALTER TABLE) that our
            # manual migrations require.
            DB_NAME=ots_db
            echo "Database: localhost/$DB_NAME (as root)"
            echo "Running SQL file..."

            mysql -u root "$DB_NAME" < "$APP_DIR/$MIGRATION_FILE"

            echo "Migration completed successfully!"
