name: Deploy to Digital Ocean Version II

on:
  push:
    branches: [main, production]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          # Key on deps only — src changes reuse the module cache for faster incremental builds
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            nextjs-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npx prisma generate && NODE_OPTIONS=--max-old-space-size=4096 npx next build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_APP_URL: "https://ots.hexasteel.sa"
          # Dummy values so Prisma Client can initialise without a real DB during build
          DATABASE_URL: "mysql://placeholder:placeholder@localhost:3306/placeholder"

      - name: Create deployment package
        run: |
          mkdir -p deploy-package
          echo "${GITHUB_SHA}" > deploy-package/DEPLOYED_COMMIT
          echo "${GITHUB_REF_NAME}" > deploy-package/DEPLOYED_BRANCH
          date -u +"%Y-%m-%dT%H:%M:%SZ" > deploy-package/DEPLOYED_AT
          tar -C . --exclude='.next/cache' -cf - .next | tar -C deploy-package -xf -
          cp -r public deploy-package/ || true
          cp -r prisma deploy-package/
          cp package*.json deploy-package/
          cp ecosystem.config.js deploy-package/ || true
          cp next.config.ts deploy-package/ || true
          tar -czf deploy.tar.gz -C deploy-package .

      - name: Deploy to Digital Ocean
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_PORT }}
          source: "deploy.tar.gz"
          target: "/tmp/"

      - name: Extract and restart application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_PORT }}
          script: |
            set -e
            APP_DIR=/var/www/hexasteel.sa/ots
            cd "$APP_DIR"

            # ── 1. Capture hashes before extracting ─────────────────────────
            PREV_PKG_HASH=$(md5sum package-lock.json 2>/dev/null | cut -d' ' -f1 || echo "none")
            PREV_SCHEMA_HASH=$(md5sum prisma/schema.prisma 2>/dev/null | cut -d' ' -f1 || echo "none")

            # ── 2. Extract pre-built artifacts (built in CI) ─────────────────
            echo "Extracting build artifacts..."
            rm -rf .next
            rm -rf "$APP_DIR/prisma/manual_migrations"
            tar -xzf /tmp/deploy.tar.gz -C "$APP_DIR"
            rm -f /tmp/deploy.tar.gz

            NEW_PKG_HASH=$(md5sum package-lock.json 2>/dev/null | cut -d' ' -f1 || echo "none")
            NEW_SCHEMA_HASH=$(md5sum prisma/schema.prisma 2>/dev/null | cut -d' ' -f1 || echo "none")
            echo "APP_VERSION=$(cat DEPLOYED_COMMIT | cut -c1-7)" >> "$APP_DIR/.env"

            # ── 3. Install deps only when package-lock.json changed ──────────
            if [ "$PREV_PKG_HASH" != "$NEW_PKG_HASH" ]; then
              echo "package-lock.json changed — installing production dependencies..."
              npm ci --omit=dev
            else
              echo "package-lock.json unchanged — skipping npm ci"
            fi

            # ── 4. Regenerate Prisma client only when schema changed ─────────
            if [ "$PREV_SCHEMA_HASH" != "$NEW_SCHEMA_HASH" ]; then
              echo "Prisma schema changed — regenerating client..."
              npx prisma generate
            else
              echo "Prisma schema unchanged — skipping prisma generate"
            fi

            # ── 5. Stop the app to free DB connections before running migrations ──
            # Prisma's schema engine opens its own connection. If the running app
            # already holds the full pool, migrate deploy hits "Too many connections".
            # Stopping first guarantees headroom; the app restarts at the end.
            echo "Stopping application to free DB connections for migrations..."
            pm2 stop hexa-steel-ots 2>/dev/null || true
            # Give the server a moment to release connections
            sleep 3

            # ── 5a. Run Prisma migrations ────────────────────────────────────
            echo "Running Prisma migrations..."
            npx prisma migrate deploy

            # ── 5b. Run manual SQL migrations (tracked to skip already-applied) ──
            DATABASE_URL=$(grep '^DATABASE_URL=' "$APP_DIR/.env" | head -1 | cut -d'=' -f2- | tr -d '"' | tr -d "'")
            DB_USER=$(echo "$DATABASE_URL" | sed -E 's|mysql://([^:]+):.*|\1|')
            DB_PASS=$(echo "$DATABASE_URL" | sed -E 's|mysql://[^:]+:([^@]+)@.*|\1|')
            DB_HOST=$(echo "$DATABASE_URL" | sed -E 's|mysql://[^@]+@([^:/]+)[:/].*|\1|')
            DB_PORT=$(echo "$DATABASE_URL" | sed -E 's|mysql://[^@]+@[^:]+:([0-9]+)/.*|\1|')
            DB_NAME=$(echo "$DATABASE_URL" | sed -E 's|mysql://[^/]+/([^?]+).*|\1|')

            # Write temp credentials file to avoid password in process list
            MYSQL_CONF=$(mktemp)
            chmod 600 "$MYSQL_CONF"
            printf "[client]\npassword=%s\n" "$DB_PASS" > "$MYSQL_CONF"

            MIGRATIONS_DONE_FILE="$APP_DIR/.migrations_applied"

            for sql_file in "$APP_DIR"/prisma/manual_migrations/*.sql; do
              [ -f "$sql_file" ] || continue
              filename=$(basename "$sql_file")
              if grep -qxF "$filename" "$MIGRATIONS_DONE_FILE" 2>/dev/null; then
                echo "  ↷ Skipping $filename (already applied)"
                continue
              fi
              echo "Applying manual migration: $filename"
              if mysql --defaults-extra-file="$MYSQL_CONF" -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" "$DB_NAME" < "$sql_file"; then
                echo "$filename" >> "$MIGRATIONS_DONE_FILE"
                echo "  ✓ OK"
              else
                echo "  ⚠ Warning: $filename may already be applied or had an error"
              fi
            done

            # Clean up credentials file
            rm -f "$MYSQL_CONF"

            # ── 6. Start / reload the app ────────────────────────────────────
            echo "Starting application..."
            pm2 start ecosystem.config.js --update-env 2>/dev/null || pm2 reload hexa-steel-ots --update-env

            echo "Deployment complete!"
            pm2 status

      - name: Verify deployment
        run: |
          echo "Deployed commit: ${{ github.sha }}"
          sleep 5
          curl -sf -o /dev/null -w "Health check HTTP status: %{http_code}\n" \
            https://ots.hexasteel.sa/api/health || echo "⚠ Health check failed — verify app manually"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed for commit ${{ github.sha }} on branch ${{ github.ref_name }}"
          echo "Check the logs above for details."
