name: Deploy to Digital Ocean

on:
  push:
    branches: [main, production]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          # Key on deps only — src changes reuse the module cache for faster incremental builds
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            nextjs-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npx prisma generate && NODE_OPTIONS=--max-old-space-size=4096 npx next build
        env:
          NODE_ENV: production
          # No NEXT_PUBLIC_BASE_PATH - nginx proxies ots.hexasteel.sa directly to localhost:3000
          NEXT_PUBLIC_APP_URL: "https://ots.hexasteel.sa"
          # Dummy values so Prisma Client can initialise without a real DB during build
          DATABASE_URL: "mysql://placeholder:placeholder@localhost:3306/placeholder"

      - name: Create deployment package
        run: |
          mkdir -p deploy-package
          # Copy .next but exclude the webpack module cache (not needed at runtime, ~200-400MB)
          rsync -a --exclude='cache' .next/ deploy-package/.next/
          cp -r public deploy-package/ || true
          cp -r prisma deploy-package/
          cp package*.json deploy-package/
          cp ecosystem.config.js deploy-package/ || true
          cp next.config.ts deploy-package/ || true
          tar -czf deploy.tar.gz -C deploy-package .

      - name: Deploy to Digital Ocean
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_PORT }}
          source: "deploy.tar.gz"
          target: "/tmp/"

      - name: Extract and restart application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_PORT }}
          script: |
            set -e
            APP_DIR=/var/www/hexasteel.sa/ots
            cd "$APP_DIR"

            # ── 1. Capture what changed before extracting ────────────────────
            PREV_PKG_HASH=$(md5sum package-lock.json 2>/dev/null | cut -d' ' -f1 || echo "none")
            PREV_SCHEMA_HASH=$(md5sum prisma/schema.prisma 2>/dev/null | cut -d' ' -f1 || echo "none")

            # ── 2. Extract pre-built artifacts (built in CI) ─────────────────
            echo "Extracting build artifacts..."
            rm -rf .next
            tar -xzf /tmp/deploy.tar.gz -C "$APP_DIR"
            rm -f /tmp/deploy.tar.gz

            NEW_PKG_HASH=$(md5sum package-lock.json 2>/dev/null | cut -d' ' -f1 || echo "none")
            NEW_SCHEMA_HASH=$(md5sum prisma/schema.prisma 2>/dev/null | cut -d' ' -f1 || echo "none")

            # ── 3. Install deps only when package-lock.json changed ─────────
            if [ "$PREV_PKG_HASH" != "$NEW_PKG_HASH" ]; then
              echo "package-lock.json changed — installing production dependencies..."
              npm ci --omit=dev
            else
              echo "package.json unchanged — skipping npm ci"
            fi

            # ── 4. Regenerate Prisma client only when schema changed ─────────
            if [ "$PREV_SCHEMA_HASH" != "$NEW_SCHEMA_HASH" ]; then
              echo "Prisma schema changed — regenerating client..."
              npx prisma generate
            else
              echo "Prisma schema unchanged — skipping prisma generate"
            fi

            # ── 5. Run Prisma migrations ──────────────────────────────────────
            echo "Running database migrations..."
            npx prisma migrate deploy || echo "No pending migrations"

            # ── 6. Reload app (zero-downtime hot reload) ──────────────────────
            echo "Reloading application..."
            pm2 reload hexa-steel-ots --update-env || pm2 start ecosystem.config.js

            echo "Deployment complete!"
            pm2 status

      - name: Verify deployment
        if: always()
        run: |
          echo "Deployment status: ${{ job.status }}"
