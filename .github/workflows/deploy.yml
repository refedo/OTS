name: Deploy to Digital Ocean

on:
  push:
    branches: [main, production]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_BASE_PATH: "/ots"
          NEXT_PUBLIC_APP_URL: "https://hexasteel.sa/ots"
          # Dummy values so Prisma Client can initialise without a real DB during build
          DATABASE_URL: "mysql://placeholder:placeholder@localhost:3306/placeholder"

      - name: Create deployment package
        run: |
          mkdir -p deploy-package
          # Standalone output includes only necessary node_modules
          cp -r .next/standalone/. deploy-package/
          # Static assets and public files must be copied separately
          mkdir -p deploy-package/.next/static
          cp -r .next/static/. deploy-package/.next/static/
          cp -r public deploy-package/public || true
          # Include prisma for migrations and ecosystem config for PM2
          cp -r prisma deploy-package/
          mkdir -p deploy-package/node_modules
          cp -r node_modules/prisma deploy-package/node_modules/prisma
          cp -r node_modules/@prisma deploy-package/node_modules/@prisma
          cp ecosystem.config.js deploy-package/ || true
          tar -czf deploy.tar.gz -C deploy-package .

      - name: Deploy to Digital Ocean
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_PORT }}
          source: "deploy.tar.gz"
          target: "/tmp/"

      - name: Extract and restart application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_PORT }}
          script: |
            cd /var/www/hexasteel.sa/ots

            echo "Stopping application..."
            pm2 stop hexa-steel-ots || true

            echo "Extracting pre-built standalone files..."
            tar -xzf /tmp/deploy.tar.gz -C /var/www/hexasteel.sa/ots
            rm -f /tmp/deploy.tar.gz

            echo "Running database migrations..."
            npx prisma migrate deploy

            echo "Restarting application..."
            pm2 restart hexa-steel-ots --update-env || pm2 start ecosystem.config.js

            echo "Deployment complete!"
            pm2 status

      - name: Verify deployment
        if: always()
        run: |
          echo "Deployment status: ${{ job.status }}"
