<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hexa Steel OTS — Restarting</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 48px 40px;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }

    .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 32px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 28px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 12px;
    }

    p {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .countdown {
      display: inline-block;
      margin-top: 24px;
      font-size: 13px;
      color: #64748b;
    }

    .countdown span {
      color: #3b82f6;
      font-weight: 600;
    }

    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 24px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }

    .btn:hover { background: #2563eb; }

    .status {
      margin-top: 32px;
      padding: 12px 16px;
      background: #0f172a;
      border-radius: 6px;
      font-size: 12px;
      color: #475569;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Hexa Steel &reg; OTS</div>

    <div class="spinner"></div>

    <h1>System is restarting</h1>
    <p>The server encountered an issue and is recovering automatically.</p>
    <p>This usually takes less than 30 seconds.</p>

    <div class="countdown">
      Refreshing in <span id="timer">15</span>s
    </div>

    <br />
    <a class="btn" href="javascript:location.reload()">Refresh now</a>

    <div class="status" id="status">Waiting for server&hellip;</div>
  </div>

  <script>
    // Countdown + auto-refresh
    var seconds = 15;
    var el = document.getElementById('timer');
    var interval = setInterval(function () {
      seconds--;
      el.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(interval);
        document.getElementById('status').textContent = 'Checking server…';
        location.reload();
      }
    }, 1000);

    // Also poll /api/health every 5 s — refresh as soon as the server is back
    function poll() {
      fetch('/ots/api/health', { cache: 'no-store' })
        .then(function (r) {
          if (r.ok) {
            document.getElementById('status').textContent = 'Server is back — redirecting…';
            clearInterval(interval);
            location.reload();
          }
        })
        .catch(function () { /* still down, keep waiting */ });
    }
    setInterval(poll, 5000);
  </script>
</body>
</html>
